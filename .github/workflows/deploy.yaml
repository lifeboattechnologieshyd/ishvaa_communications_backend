name: Deploy Ishvaa Communications

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ishvaa-communications-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ISHVAA_EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add known hosts
        run: |
          ssh-keyscan -H "${{ secrets.ISHVAA_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa \
            "${{ secrets.ISHVAA_EC2_USER }}@${{ secrets.ISHVAA_EC2_HOST }}" << 'EOF'
          set -e

          cd /home/ubuntu/ishvaa_communications_backend

          git fetch origin
          git reset --hard origin/main
          git clean -fd

          docker network create ishvaa-communications-network || true
          docker volume create ishvaa_communications_pg_data || true

          docker compose \
            -p ishvaa-communications \
            -f deploy/compose/docker-compose.yaml \
            --env-file .env.docker \
            up -d --build --remove-orphans postgres backend

          docker image prune -f

          echo "Ishvaa deployment completed"

          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" \
            | grep ishvaa || true
          EOF